<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Routine Timer</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Exercise Routine</h1>
</header>

<section id="builder">

<h2>Create Exercise</h2>

<input id="name" placeholder="Exercise name">

<input id="time" type="number" placeholder="Seconds">

<label>
Switch sides halfway
<input type="checkbox" id="sides">
</label>

<label>
Rest after (seconds)
<input id="rest" type="number" placeholder="0">
</label>

<input type="file" id="photo">

<button onclick="addExercise()">Add Exercise</button>

</section>

<section>
<h2>Routine</h2>
<div id="routine"></div>
</section>

<section>
<button onclick="startWorkout()">Start Workout</button>
</section>

<section id="player">

<h2 id="exerciseTitle"></h2>

<img id="exerciseImg">

<div id="timer"></div>

</section>

<script src="app.js"></script>

</body>
</html>
